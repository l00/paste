<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">
    <title>bin</title>
</head>
<body>
    <h1>Create new paste</h1>
    <textarea id="editor"></textarea><br>
    <script>
        const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
            lineNumbers: true,
            indentUnit: 4,
            theme: "monokai",
            mode: null,
        });
    </script>
    <input id="author" placeholder="Author (optional)"><br>
    <button onclick="createPaste()">Create</button>
    <p id="createStatus"></p>
    <script>
        async function createPaste() {
            const content = editor.getValue();
            const author = !document.getElementById('author').value ? "Guest" : document.getElementById('author').value;
            const data = {
                text: content,
                author: author
            }
            const res = await fetch("http://127.0.0.1:8000/create", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const resjson = await res.json();
            console.log(resjson.id);

            if (!res.ok) {
                document.getElementById('createStatus').innerHTML = `Error ${res.status}: ${resjson.detail}`;
            } else {
                window.location.href = `file:///home/si/pastebin/view.html?id=${resjson.id}`;
            }
        }
    </script>
</body>
</html>
